name: Windows build and release

on:
  push:
    branches: [main, beta, alpha]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  validate-and-build:
    runs-on: windows-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate stable build
        run: npm run validate

      - name: Run Electron end-to-end smoke test
        run: npm run test:e2e:electron

      - name: Validate release tag
        if: ${{ startsWith(github.ref, 'refs/tags/v') }}
        run: npm run release:verify

      - name: Verify Windows signing secrets
        if: ${{ startsWith(github.ref, 'refs/tags/v') }}
        env:
          WINDOWS_CSC_LINK: ${{ secrets.WINDOWS_CSC_LINK }}
          WINDOWS_CSC_KEY_PASSWORD: ${{ secrets.WINDOWS_CSC_KEY_PASSWORD }}
        run: npm run release:verify-signing

      - name: Build Windows installer and update metadata
        env:
          CSC_LINK: ${{ secrets.WINDOWS_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.WINDOWS_CSC_KEY_PASSWORD }}
          KITSUNEDESK_CHECKSUM_PRIVATE_KEY_B64: ${{ secrets.KITSUNEDESK_CHECKSUM_PRIVATE_KEY_B64 }}
          KITSUNEDESK_REQUIRE_SIGNED_CHECKSUMS: ${{ startsWith(github.ref, 'refs/tags/v') }}
        run: npm run providers:bundle && npm run release:build

      - name: Verify installer, blockmap and latest.yml
        env:
          KITSUNEDESK_REQUIRE_SIGNED_CHECKSUMS: ${{ startsWith(github.ref, 'refs/tags/v') }}
        run: npm run release:verify-artifacts

      - name: Verify installer Authenticode signature
        if: ${{ startsWith(github.ref, 'refs/tags/v') }}
        shell: pwsh
        run: |
          $version = node -p "require('./package.json').version"
          $signature = Get-AuthenticodeSignature "dist/KitsuneDesk-Setup-$version.exe"
          if ($signature.Status -ne 'Valid') {
            throw "Assinatura Authenticode inválida: $($signature.Status)"
          }

      - name: Test installed upgrade from previous GitHub Release
        if: ${{ startsWith(github.ref, 'refs/tags/v') }}
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./scripts/test-installed-update.ps1 -PreviousTag v0.12.0

      - name: Publish GitHub release assets
        if: ${{ startsWith(github.ref, 'refs/tags/v') }}
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $ErrorActionPreference = 'Stop'
          $tag = $env:GITHUB_REF_NAME
          $version = node -p "require('./package.json').version"
          $installer = "dist/KitsuneDesk-Setup-$version.exe"
          $blockmap = "$installer.blockmap"
          $metadata = 'dist/latest.yml'
          $checksums = 'resources/providers/SHA256SUMS'
          $checksumSignature = 'resources/providers/SHA256SUMS.sig'
          $assets = @($installer, $blockmap, $metadata, $checksums, $checksumSignature)

          gh release view $tag *> $null
          if ($LASTEXITCODE -eq 0) {
            gh release upload $tag $assets --clobber
            gh release edit $tag --latest --draft=false --prerelease=false
          } else {
            gh release create $tag $assets `
              --verify-tag `
              --title "KitsuneDesk v$version" `
              --generate-notes `
              --latest
          }

      - name: Upload Windows build artifact
        uses: actions/upload-artifact@v4
        with:
          name: KitsuneDesk-Windows-${{ github.sha }}
          path: |
            dist/*.exe
            dist/*.yml
            dist/*.blockmap
            resources/providers/SHA256SUMS
            resources/providers/SHA256SUMS.sig
          if-no-files-found: error
          retention-days: 14
