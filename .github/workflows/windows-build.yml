name: Windows build and release

on:
  push:
    branches: [main, beta, alpha]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  validate-and-build:
    runs-on: windows-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate stable build
        run: npm run validate

      - name: Run Electron end-to-end smoke test
        run: npm run test:e2e:electron

      - name: Validate release tag
        if: ${{ startsWith(github.ref, 'refs/tags/v') }}
        run: npm run release:verify

      - name: Build Windows installer and update metadata
        env:
          PROVIDER_MANIFEST_PRIVATE_KEY: ${{ secrets.PROVIDER_MANIFEST_PRIVATE_KEY }}
          PROVIDER_MANIFEST_PUBLIC_KEY: ${{ secrets.PROVIDER_MANIFEST_PUBLIC_KEY }}
        run: npm run providers:bundle && npm run release:build

      - name: Verify installer, blockmap and latest.yml
        run: npm run release:verify-artifacts

      - name: Test installed upgrade from previous GitHub Release
        if: ${{ startsWith(github.ref, 'refs/tags/v') }}
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./scripts/test-installed-update.ps1 -PreviousTag v0.12.0 -ValidateRollback -ValidateInterruptedDownload

      - name: Publish GitHub release assets
        if: ${{ startsWith(github.ref, 'refs/tags/v') }}
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $ErrorActionPreference = 'Stop'
          $tag = $env:GITHUB_REF_NAME
          $version = node -p "require('./package.json').version"
          $installer = "dist/KitsuneDesk-Setup-$version.exe"
          $blockmap = "$installer.blockmap"
          $metadata = 'dist/latest.yml'
          $assets = @($installer, $blockmap, $metadata)

          gh release view $tag *> $null
          if ($LASTEXITCODE -eq 0) {
            gh release upload $tag $assets --clobber
            gh release edit $tag --latest --draft=false --prerelease=false
          } else {
            gh release create $tag $assets `
              --verify-tag `
              --title "KitsuneDesk v$version" `
              --generate-notes `
              --latest
          }

      - name: Upload Windows build artifact
        uses: actions/upload-artifact@v4
        with:
          name: KitsuneDesk-Windows-${{ github.sha }}
          path: |
            dist/*.exe
            dist/*.yml
            dist/*.blockmap
          if-no-files-found: error
          retention-days: 14
