appId: br.com.kitsunedesk.local
productName: KitsuneDesk
artifactName: KitsuneDesk-Setup-${version}.${ext}

asar: true
electronLanguages:
  - pt-BR
  - en-US
  - es
  - fr
  - de
  - ja

asarUnpack:
  - scripts/windows/**/*
  - resources/goanime-bridge/**/*
  - resources/providers/**/*

npmRebuild: true

directories:
  output: dist

files:
  - src/**/*
  - resources/**/*
  - assets/**/*
  - scripts/windows/**/*
  - package.json
  - '!node_modules/better-sqlite3/build/Release/obj/**/*'
  - '!node_modules/better-sqlite3/build/Release/*.iobj'
  - '!node_modules/better-sqlite3/build/Release/*.ipdb'
  - '!node_modules/better-sqlite3/build/Release/*.lib'
  - '!node_modules/better-sqlite3/build/Release/*.exp'
  - '!node_modules/better-sqlite3/build/Release/test_extension.node'
  - '!node_modules/better-sqlite3/deps/**/*'

win:
  icon: assets/icons/icon.ico
  verifyUpdateCodeSignature: false
  target:
    - target: nsis
      arch:
        - x64

nsis:
  license: docs/INSTALLER_TERMS.txt
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: KitsuneDesk
  runAfterFinish: true
  deleteAppDataOnUninstall: false

publish:
  provider: github
  owner: RaphaelTW
  repo: kitsuneDesk
  releaseType: release
