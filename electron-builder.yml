appId: br.com.kitsunedesk.local
productName: KitsuneDesk
artifactName: KitsuneDesk-Setup-${version}.${ext}

asar: true

asarUnpack:
  - scripts/windows/**/*
  - resources/goanime-bridge/**/*
  - resources/providers/**/*

npmRebuild: true

directories:
  output: dist

files:
  - src/**/*
  - resources/**/*
  - assets/**/*
  - scripts/windows/**/*
  - package.json

win:
  icon: assets/icons/icon.ico
  target:
    - target: nsis
      arch:
        - x64

nsis:
  license: docs/INSTALLER_TERMS.txt
  installerLanguages:
    - pt_BR
    - en_US
  language: '1046'
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: KitsuneDesk
  runAfterFinish: true
  deleteAppDataOnUninstall: false

publish:
  provider: github
  owner: RaphaelTW
  repo: kitsuneDesk
  releaseType: release
