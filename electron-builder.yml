appId: br.com.kitsunedesk.local
productName: KitsuneDesk
artifactName: KitsuneDesk-Setup-${version}.${ext}
asar: true
asarUnpack:
  - scripts/windows/**/*
  - resources/goanime-bridge/**/*
npmRebuild: true

directories:
  output: dist

files:
  - src/**/*
  - resources/**/*
  - assets/**/*
  - scripts/windows/**/*
  - package.json

win:
  target:
    - target: nsis
      arch:
        - x64

nsis:
  oneClick: false
  license: build/installer-terms.txt
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: KitsuneDesk
  runAfterFinish: true
