<div class="history-toolbar panel">
  <div class="search-input-wrap compact">
    <i class="bi bi-search"></i
    ><input
      id="history-search"
      type="search"
      placeholder="Pesquisar no historico"
      aria-label="Pesquisar no historico"
    />
  </div>
  <div class="history-actions">
    <button class="btn btn-outline-light" id="export-history-button" type="button">
      <i class="bi bi-filetype-csv"></i> Exportar CSV
    </button>
    <button class="btn btn-outline-danger" id="clear-history-button" type="button">
      <i class="bi bi-trash"></i> Limpar historico
    </button>
  </div>
</div>
<div class="history-list" id="history-list"></div>
