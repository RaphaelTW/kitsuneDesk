<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self' data:; font-src 'self'; connect-src 'self';"
    />
    <title>Alterar senha - KitsuneDesk</title>
    <link rel="stylesheet" href="../vendor/bootstrap/css/bootstrap.min.css" />
    <link rel="stylesheet" href="../vendor/bootstrap-icons/font/bootstrap-icons.min.css" />
    <link rel="stylesheet" href="../css/global.css" />
    <link rel="stylesheet" href="../css/login.css" />
  </head>
  <body class="auth-page">
    <main class="auth-shell">
      <section class="auth-card password-card" aria-labelledby="password-title">
        <div class="auth-brand">
          <img src="../../../assets/kitsunedesk-logo.svg" alt="" width="48" height="48" />
          <div>
            <p>KitsuneDesk</p>
            <h1 id="password-title">Alterar senha</h1>
          </div>
        </div>

        <form id="change-password-form" novalidate>
          <div class="mb-3">
            <label class="form-label" for="current-password">Senha atual</label>
            <input
              class="form-control"
              id="current-password"
              name="currentPassword"
              type="password"
              autocomplete="current-password"
              required
            />
          </div>

          <div class="mb-3">
            <label class="form-label" for="new-password">Nova senha</label>
            <input
              class="form-control"
              id="new-password"
              name="newPassword"
              type="password"
              autocomplete="new-password"
              required
            />
          </div>

          <div class="mb-3">
            <label class="form-label" for="confirm-password">Confirmar nova senha</label>
            <input
              class="form-control"
              id="confirm-password"
              name="confirmPassword"
              type="password"
              autocomplete="new-password"
              required
            />
          </div>

          <ul class="password-rules" aria-label="Requisitos da senha">
            <li id="rule-length"><i class="bi bi-circle"></i> Oito caracteres</li>
            <li id="rule-uppercase"><i class="bi bi-circle"></i> Uma letra maiuscula</li>
            <li id="rule-lowercase"><i class="bi bi-circle"></i> Uma letra minuscula</li>
            <li id="rule-number"><i class="bi bi-circle"></i> Um numero</li>
            <li id="rule-match"><i class="bi bi-circle"></i> Confirmacao igual</li>
          </ul>

          <div id="password-alert" class="visual-alert d-none" role="status"></div>

          <button class="btn btn-primary w-100 auth-submit" id="password-button" type="submit">
            <span class="button-label">Salvar senha</span>
            <span class="neon-spinner neon-spinner-sm d-none" aria-hidden="true"></span>
          </button>
        </form>
      </section>
    </main>

    <div id="toast-container" class="toast-container position-fixed top-0 end-0 p-3"></div>

    <script src="../vendor/bootstrap/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="../js/change-password.js"></script>
  </body>
</html>
