<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self' data:; font-src 'self'; connect-src 'self';"
    />
    <title>Entrar - KitsuneDesk</title>
    <link rel="stylesheet" href="../vendor/bootstrap/css/bootstrap.min.css" />
    <link rel="stylesheet" href="../vendor/bootstrap-icons/font/bootstrap-icons.min.css" />
    <link rel="stylesheet" href="../css/global.css" />
    <link rel="stylesheet" href="../css/login.css" />
  </head>
  <body class="auth-page">
    <main class="auth-shell">
      <section class="auth-card" aria-labelledby="auth-title">
        <div class="auth-brand">
          <img src="../../../assets/icons/kitsunedesk-icon-128.png" alt="" width="48" height="48" />
          <div>
            <p>KitsuneDesk</p>
            <h1 id="auth-title">Carregando</h1>
          </div>
        </div>

        <form id="setup-form" class="d-none" novalidate>
          <div class="auth-hint auth-hint-success">
            <i class="bi bi-shield-check"></i>
            <span>Primeiro acesso: use admin/admin123 e troque a senha obrigatoriamente.</span>
          </div>

          <div class="mb-3">
            <label class="form-label" for="setup-name">Nome</label>
            <input class="form-control" id="setup-name" name="name" required minlength="2" />
          </div>

          <div class="mb-3">
            <label class="form-label" for="setup-username">Usuário</label>
            <input
              class="form-control"
              id="setup-username"
              name="username"
              autocomplete="username"
              required
              minlength="3"
            />
          </div>

          <div class="mb-3">
            <label class="form-label" for="setup-password">Senha</label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-lock"></i></span>
              <input
                class="form-control"
                id="setup-password"
                name="password"
                type="password"
                autocomplete="new-password"
                required
                minlength="8"
              />
              <button
                class="btn btn-outline-light password-toggle"
                data-target="setup-password"
                type="button"
              >
                <i class="bi bi-eye"></i>
              </button>
            </div>
          </div>

          <div class="mb-3">
            <label class="form-label" for="setup-password-confirm">Confirmar senha</label>
            <input
              class="form-control"
              id="setup-password-confirm"
              type="password"
              autocomplete="new-password"
              required
            />
          </div>

          <div id="setup-alert" class="visual-alert d-none" role="status"></div>
          <button class="btn btn-primary w-100 auth-submit" id="setup-button" type="submit">
            <span class="button-label">Criar administrador</span>
            <span class="neon-spinner neon-spinner-sm d-none"></span>
          </button>
        </form>

        <form id="login-form" class="d-none" novalidate>
          <div class="mb-3">
            <label class="form-label" for="username">Usuário</label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-person"></i></span>
              <input
                class="form-control"
                id="username"
                name="username"
                autocomplete="username"
                required
              />
            </div>
          </div>

          <div class="mb-3">
            <label class="form-label" for="password">Senha</label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-lock"></i></span>
              <input
                class="form-control"
                id="password"
                name="password"
                type="password"
                autocomplete="current-password"
                required
              />
              <button
                class="btn btn-outline-light password-toggle"
                data-target="password"
                type="button"
              >
                <i class="bi bi-eye"></i>
              </button>
            </div>
          </div>

          <div class="auth-hint">
            <i class="bi bi-person-lock"></i>
            <span>Primeiro acesso: usuario admin e senha admin123. A troca sera obrigatoria.</span>
          </div>

          <div class="auth-hint">
            <i class="bi bi-shield-lock"></i>
            <span>O bloqueio apos tentativas invalidas permanece ativo mesmo apos reiniciar.</span>
          </div>

          <div id="login-alert" class="visual-alert d-none" role="status"></div>
          <button class="btn btn-primary w-100 auth-submit" id="login-button" type="submit">
            <span class="button-label">Entrar</span>
            <span class="neon-spinner neon-spinner-sm d-none"></span>
          </button>
        </form>
      </section>
    </main>

    <script src="../vendor/bootstrap/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="../js/login.js"></script>
  </body>
</html>
