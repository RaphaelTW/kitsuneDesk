<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self' data:; font-src 'self'; connect-src 'self';"
    />
    <title>Entrar - KitsuneDesk</title>
    <link rel="stylesheet" href="../vendor/bootstrap/css/bootstrap.min.css" />
    <link rel="stylesheet" href="../vendor/bootstrap-icons/font/bootstrap-icons.min.css" />
    <link rel="stylesheet" href="../css/global.css" />
    <link rel="stylesheet" href="../css/login.css" />
  </head>
  <body class="auth-page">
    <main class="auth-shell">
      <section class="auth-card" aria-labelledby="login-title">
        <div class="auth-brand">
          <img src="../../../assets/kitsunedesk-logo.svg" alt="" width="48" height="48" />
          <div>
            <p>KitsuneDesk</p>
            <h1 id="login-title">Entrar</h1>
          </div>
        </div>

        <form id="login-form" novalidate>
          <div class="mb-3">
            <label class="form-label" for="username">Usuario</label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-person"></i></span>
              <input
                class="form-control"
                id="username"
                name="username"
                autocomplete="username"
                required
                value="admin"
              />
            </div>
          </div>

          <div class="mb-3">
            <label class="form-label" for="password">Senha</label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-lock"></i></span>
              <input
                class="form-control"
                id="password"
                name="password"
                type="password"
                autocomplete="current-password"
                required
              />
              <button
                class="btn btn-outline-light password-toggle"
                id="toggle-password"
                type="button"
                data-bs-toggle="tooltip"
                data-bs-title="Mostrar senha"
                aria-label="Mostrar senha"
              >
                <i class="bi bi-eye"></i>
              </button>
            </div>
          </div>

          <div class="auth-hint">
            <i class="bi bi-key"></i>
            <span>Primeiro acesso: admin / admin123</span>
          </div>

          <div id="login-alert" class="visual-alert d-none" role="status"></div>

          <button class="btn btn-primary w-100 auth-submit" id="login-button" type="submit">
            <span class="button-label">Entrar</span>
            <span class="spinner-border spinner-border-sm d-none" aria-hidden="true"></span>
          </button>
        </form>
      </section>
    </main>

    <div id="toast-container" class="toast-container position-fixed top-0 end-0 p-3"></div>

    <script src="../vendor/bootstrap/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="../js/login.js"></script>
  </body>
</html>
